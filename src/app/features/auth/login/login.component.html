<div class="relative flex min-h-[calc(100vh-64px)] flex-col items-center justify-center overflow-hidden px-4 py-12">
  
  <div class="pointer-events-none absolute inset-0 flex items-center justify-center" aria-hidden="true">
    <div class="absolute top-1/4 h-[400px] w-[400px] rounded-full bg-[var(--color-neon-lime)] opacity-5 blur-[120px]"></div>
  </div>

  <div class="relative z-10 w-full max-w-[420px] animate-fade-in-up">
    
    <div class="rounded-[2rem] border border-[var(--color-charcoal-grey)] bg-[var(--color-graphite)]/60 p-8 shadow-2xl backdrop-blur-xl sm:p-10">
      
     <div class="mb-10 text-center">
        <div class="mx-auto mb-4 flex size-12 items-center justify-center rounded-2xl bg-[var(--color-neon-lime)]/10 text-[var(--color-neon-lime)]">
          <lucide-icon name="gavel" [size]="24"></lucide-icon>
        </div>
        <h1 class="mb-2 text-[24px] font-[590] tracking-tight text-[var(--color-porcelain)]">
          Bienvenido
        </h1>
        <p class="text-[14px] text-[var(--color-storm-cloud)]">
          Inicia sesión para continuar en InnovaNow.
        </p>
      </div>

      @if (errorMessage()) {
        <div class="mb-6 flex items-start gap-3 rounded-xl border border-red-500/20 bg-red-500/10 p-4 text-left animate-fade-in">
          <lucide-icon name="lock" [size]="18" class="mt-0.5 shrink-0 text-red-400"></lucide-icon>
          <p class="text-[13px] font-[510] text-red-400">{{ errorMessage() }}</p>
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <div>
          <label class="mb-1.5 block text-[10px] font-[590] uppercase tracking-widest text-[var(--color-storm-cloud)]">
            Correo Electrónico
          </label>
          <div class="relative">
            <lucide-icon name="mail" [size]="18" class="absolute left-4 top-1/2 -translate-y-1/2 text-[var(--color-fog-grey)]"></lucide-icon>
            <input 
              type="email" 
              formControlName="email"
              placeholder="  tucorreo@ejemplo.com"
              class="w-full rounded-xl border border-[var(--color-charcoal-grey)] bg-[var(--color-pitch-black)]/50 px-4 py-3.5 pl-11 text-[14px] text-[var(--color-porcelain)] placeholder:text-[var(--color-fog-grey)] focus:border-[var(--color-cyan-spark)] focus:outline-none focus:ring-1 focus:ring-[var(--color-cyan-spark)] transition-all"
              [ngClass]="{'border-red-500/50 focus:border-red-500 focus:ring-red-500': loginForm.get('email')?.invalid && loginForm.get('email')?.touched}"
            >
          </div>
        </div>

        <div>
          <div class="mb-1.5 flex items-center justify-between">
            <label class="text-[10px] font-[590] uppercase tracking-widest text-[var(--color-storm-cloud)]">
              Contraseña
            </label>
            <a href="#" class="text-[11px] font-[510] text-[var(--color-cyan-spark)] hover:underline">
              ¿Olvidaste tu contraseña?
            </a>
          </div>
          <div class="relative">
            <lucide-icon name="lock" [size]="18" class="absolute left-4 top-1/2 -translate-y-1/2 text-[var(--color-fog-grey)]"></lucide-icon>
            <input 
              [type]="showPassword() ? 'text' : 'password'" 
              formControlName="password"
              placeholder="••••••••"
              class="w-full rounded-xl border border-[var(--color-charcoal-grey)] bg-[var(--color-pitch-black)]/50 px-4 py-3.5 pl-11 pr-11 text-[14px] text-[var(--color-porcelain)] placeholder:text-[var(--color-fog-grey)] focus:border-[var(--color-cyan-spark)] focus:outline-none focus:ring-1 focus:ring-[var(--color-cyan-spark)] transition-all"
              [ngClass]="{'border-red-500/50 focus:border-red-500 focus:ring-red-500': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}"
            >
            <button 
              type="button" 
              (click)="togglePasswordVisibility()"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-[var(--color-fog-grey)] hover:text-[var(--color-porcelain)] transition-colors"
            >
              <lucide-icon [name]="showPassword() ? 'eye-off' : 'eye'" [size]="18"></lucide-icon>
            </button>
          </div>
        </div>

        <button 
          type="submit" 
          [disabled]="isLoading()"
          class="group relative mt-2 flex w-full items-center justify-center gap-2 rounded-xl bg-[var(--color-neon-lime)] py-3.5 text-[15px] font-[590] text-[var(--color-pitch-black)] transition-all hover:brightness-110 active:scale-[0.98] disabled:opacity-70 disabled:pointer-events-none shadow-[0_0_15px_rgba(228,242,34,0.15)]"
        >
          @if (isLoading()) {
            <lucide-icon name="loader-2" [size]="18" class="animate-spin"></lucide-icon>
            Autenticando...
          } @else {
            <lucide-icon name="log-in" [size]="18"></lucide-icon>
            Iniciar Sesión
          }
        </button>

      </form>

      <div class="my-8 flex items-center gap-4">
        <div class="h-px flex-1 bg-[var(--color-charcoal-grey)]"></div>
        <span class="text-[10px] font-[590] uppercase tracking-widest text-[var(--color-storm-cloud)]">O continuar con</span>
        <div class="h-px flex-1 bg-[var(--color-charcoal-grey)]"></div>
      </div>

      <button type="button" class="flex w-full items-center justify-center gap-3 rounded-xl border border-[var(--color-charcoal-grey)] bg-[var(--color-deep-slate)]/30 py-3.5 text-[14px] font-[510] text-[var(--color-porcelain)] transition-all hover:bg-[var(--color-deep-slate)] active:scale-[0.98]">
        <svg class="h-5 w-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>

    </div>

    <div class="mt-8 text-center">
      <p class="text-[13px] text-[var(--color-storm-cloud)]">
        ¿No tienes una cuenta? 
       <a routerLink="/register" class="font-[510] text-[var(--color-neon-lime)] hover:underline">Regístrate</a>
      </p>
    </div>

  </div>
</div>
