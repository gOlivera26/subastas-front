<div class="flex h-screen bg-[var(--color-pitch-black)] overflow-hidden">

  @if (isSidebarOpen()) {
    <div (click)="closeSidebar()" class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm lg:hidden transition-opacity"></div>
  }

  <aside
    class="fixed inset-y-0 left-0 z-50 w-72 flex flex-col border-r border-[var(--color-charcoal-grey)] bg-[var(--color-graphite)]/95 backdrop-blur-xl transition-transform duration-300 lg:static lg:translate-x-0"
    [ngClass]="isSidebarOpen() ? 'translate-x-0' : '-translate-x-full'">

    <div class="flex h-16 shrink-0 items-center justify-between px-6 border-b border-[var(--color-charcoal-grey)]">
      <a routerLink="/clasificadores" class="flex items-center gap-3 transition-opacity hover:opacity-80">
        <div class="flex size-8 items-center justify-center rounded-lg bg-[var(--color-neon-lime)]/10 text-[var(--color-neon-lime)]">
          <lucide-icon name="layout-template" [size]="18"></lucide-icon>
        </div>
        <span class="text-[15px] font-[590] tracking-tight text-[var(--color-porcelain)]">Clasificadores</span>
      </a>
      <button (click)="closeSidebar()" class="lg:hidden text-[var(--color-storm-cloud)] hover:text-[var(--color-porcelain)]">
        <lucide-icon name="x" [size]="20"></lucide-icon>
      </button>
    </div>

    <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
      <p class="px-3 mb-2 text-[10px] font-[590] uppercase tracking-widest text-[var(--color-storm-cloud)]">Catálogos</p>

      <a routerLink="/clasificadores/organizaciones"
         routerLinkActive="bg-[var(--color-deep-slate)] text-[var(--color-cyan-spark)] border-[var(--color-charcoal-grey)] shadow-sm"
         (click)="closeSidebar()"
         class="flex items-center gap-3 rounded-xl border border-transparent px-4 py-3 text-[14px] font-[510] text-[var(--color-light-steel)] transition-all hover:bg-[var(--color-deep-slate)]/50 hover:text-[var(--color-porcelain)]">
        <lucide-icon name="building" [size]="18"></lucide-icon>
        Organizaciones
      </a>

      <a routerLink="/clasificadores/vigencias"
         routerLinkActive="bg-[var(--color-deep-slate)] text-[var(--color-neon-lime)] border-[var(--color-charcoal-grey)] shadow-sm"
         [routerLinkActiveOptions]="{exact: true}"
         (click)="closeSidebar()"
         class="flex items-center gap-3 rounded-xl border border-transparent px-4 py-3 text-[14px] font-[510] text-[var(--color-light-steel)] transition-all hover:bg-[var(--color-deep-slate)]/50 hover:text-[var(--color-porcelain)]">
        <lucide-icon name="calendar" [size]="18"></lucide-icon>
        Vigencias
      </a>

      <a routerLink="/clasificadores/unidades-administrativas"
         routerLinkActive="bg-[var(--color-deep-slate)] text-[var(--color-cyan-spark)] border-[var(--color-charcoal-grey)] shadow-sm"
         (click)="closeSidebar()"
         class="flex items-center gap-3 rounded-xl border border-transparent px-4 py-3 text-[14px] font-[510] text-[var(--color-light-steel)] transition-all hover:bg-[var(--color-deep-slate)]/50 hover:text-[var(--color-porcelain)]">
        <lucide-icon name="building-2" [size]="18"></lucide-icon>
        Unidades Adm.
      </a>

      <div class="my-6 border-t border-[var(--color-charcoal-grey)] mx-3"></div>
      <p class="px-3 mb-2 text-[10px] font-[590] uppercase tracking-widest text-[var(--color-storm-cloud)]">Sistema</p>

      <a routerLink="/modulos" class="flex items-center gap-3 rounded-xl px-4 py-3 text-[14px] font-[510] text-[var(--color-storm-cloud)] hover:text-[var(--color-porcelain)] transition-colors">
        <lucide-icon name="arrow-left" [size]="18"></lucide-icon>
        Volver al Panel
      </a>
    </nav>
  </aside>

  <div class="flex flex-1 flex-col overflow-hidden relative">

    <header class="flex h-16 shrink-0 items-center justify-between border-b border-[var(--color-charcoal-grey)] bg-[var(--color-pitch-black)]/80 backdrop-blur-md px-4 sm:px-6 lg:px-8 lg:justify-end z-20">
      <button (click)="toggleSidebar()" class="lg:hidden flex items-center justify-center p-2 rounded-lg text-[var(--color-storm-cloud)] hover:bg-[var(--color-deep-slate)] hover:text-[var(--color-porcelain)] transition-colors">
        <lucide-icon name="menu" [size]="24"></lucide-icon>
      </button>

      <div class="flex items-center gap-3">
        <span class="text-[13px] font-[590] text-[var(--color-porcelain)] hidden sm:block">Módulo Clasificadores</span>
      </div>
    </header>

    <main [@routeFade]="routeState()"
          class="flex-1 overflow-y-auto bg-[var(--color-pitch-black)] relative">
      @if (showBreadcrumb()) {
        <div class="flex items-center gap-2 border-b border-[var(--color-charcoal-grey)] px-4 sm:px-6 lg:px-8 py-3">
          <a routerLink="/clasificadores" class="text-[13px] font-[510] text-[var(--color-storm-cloud)] transition-colors hover:text-[var(--color-porcelain)]">Clasificadores</a>
          <lucide-icon name="chevron-right" [size]="14" class="text-[var(--color-storm-cloud)]"></lucide-icon>
          <span class="text-[13px] font-[590] text-[var(--color-porcelain)]">{{ pageTitle() }}</span>
        </div>
      }
      <div class="pointer-events-none absolute inset-0 flex items-center justify-center" aria-hidden="true">
        <div class="absolute top-0 right-0 h-[600px] w-[600px] rounded-full bg-[var(--color-aether-blue)] opacity-[0.03] blur-[150px]"></div>
      </div>
      <div class="relative z-10 p-4 sm:p-6 lg:p-8">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
