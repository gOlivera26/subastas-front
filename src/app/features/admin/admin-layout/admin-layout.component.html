<div class="flex h-screen bg-[var(--color-pitch-black)]">
  
  @if (isSidebarOpen()) {
    <div (click)="closeSidebar()" class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm lg:hidden transition-opacity"></div>
  }

  <aside 
    class="fixed inset-y-0 left-0 z-50 w-72 flex flex-col border-r border-[var(--color-charcoal-grey)] bg-[var(--color-graphite)]/95 backdrop-blur-xl transition-transform duration-300 lg:static lg:translate-x-0 lg:z-auto"
    [ngClass]="isSidebarOpen() ? 'translate-x-0' : '-translate-x-full lg:translate-x-0 lg:w-0 lg:overflow-hidden lg:border-r-0'">
    
    <div class="flex h-16 shrink-0 items-center justify-between px-6 border-b border-[var(--color-charcoal-grey)]">
      <a routerLink="/modulos" class="flex items-center gap-3 transition-opacity hover:opacity-80">
        <div class="flex size-8 items-center justify-center rounded-lg bg-[var(--color-cyan-spark)]/10 text-[var(--color-cyan-spark)]">
          <lucide-icon name="shield" [size]="18"></lucide-icon>
        </div>
        <span class="text-[15px] font-[590] tracking-tight text-[var(--color-porcelain)]">Administración</span>
      </a>
      <button (click)="closeSidebar()" class="lg:hidden text-[var(--color-storm-cloud)] hover:text-[var(--color-porcelain)]">
        <lucide-icon name="x" [size]="20"></lucide-icon>
      </button>
    </div>

    <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
      <p class="px-3 mb-2 text-[10px] font-[590] uppercase tracking-widest text-[var(--color-storm-cloud)]">Gestión de Accesos</p>
      
      <a routerLink="/admin/usuarios/activos" 
         routerLinkActive="bg-[var(--color-deep-slate)] text-[var(--color-cyan-spark)] border-[var(--color-charcoal-grey)] shadow-sm"
         [routerLinkActiveOptions]="{exact: true}"
         (click)="closeSidebarOnMobile()"
         class="flex items-center gap-3 rounded-xl border border-transparent px-4 py-3 text-[14px] font-[510] text-[var(--color-light-steel)] transition-all hover:bg-[var(--color-deep-slate)]/50 hover:text-[var(--color-porcelain)]">
        <lucide-icon name="users" [size]="18"></lucide-icon>
        Usuarios Activos
      </a>

      <a routerLink="/admin/usuarios/pendientes" 
         routerLinkActive="bg-[var(--color-deep-slate)] text-[var(--color-neon-lime)] border-[var(--color-charcoal-grey)] shadow-sm"
         (click)="closeSidebarOnMobile()"
         class="flex items-center justify-between rounded-xl border border-transparent px-4 py-3 text-[14px] font-[510] text-[var(--color-light-steel)] transition-all hover:bg-[var(--color-deep-slate)]/50 hover:text-[var(--color-porcelain)]">
        <div class="flex items-center gap-3">
          <lucide-icon name="user-plus" [size]="18"></lucide-icon>
          Aprobaciones
        </div>
        </a>
      
      <div class="my-6 border-t border-[var(--color-charcoal-grey)] mx-3"></div>
      <p class="px-3 mb-2 text-[10px] font-[590] uppercase tracking-widest text-[var(--color-storm-cloud)]">Sistema</p>
      
      <a routerLink="/modulos" class="flex items-center gap-3 rounded-xl px-4 py-3 text-[14px] font-[510] text-[var(--color-storm-cloud)] hover:text-[var(--color-porcelain)] transition-colors">
        <lucide-icon name="arrow-left" [size]="18"></lucide-icon>
        Volver al Panel
      </a>
    </nav>
  </aside>

  <div class="flex flex-1 flex-col overflow-hidden relative">
    
    <header class="flex h-16 shrink-0 items-center justify-between border-b border-[var(--color-charcoal-grey)] bg-[var(--color-pitch-black)]/95 backdrop-blur-md px-4 sm:px-6 lg:px-8 z-20">
      <div class="flex items-center gap-2">
        <button (click)="toggleSidebar()" class="lg:hidden flex items-center justify-center p-2 rounded-lg text-[var(--color-storm-cloud)] hover:bg-[var(--color-deep-slate)] hover:text-[var(--color-porcelain)] transition-colors">
          <lucide-icon name="menu" [size]="24"></lucide-icon>
        </button>
        <button (click)="toggleSidebar()" class="hidden lg:flex items-center justify-center p-2 rounded-lg text-[var(--color-storm-cloud)] hover:bg-[var(--color-deep-slate)] hover:text-[var(--color-porcelain)] transition-colors">
          <lucide-icon [name]="isSidebarOpen() ? 'panel-left-close' : 'panel-left'" [size]="20"></lucide-icon>
        </button>
      </div>
      
      <div class="flex items-center gap-4 ml-auto">
        <button (click)="toggleTheme()" class="flex h-9 w-9 items-center justify-center rounded-xl border border-transparent text-[var(--color-storm-cloud)] hover:border-[var(--color-charcoal-grey)] hover:bg-[var(--color-deep-slate)]/50 hover:text-[var(--color-porcelain)] transition-all">
          <lucide-icon [name]="isDarkMode() ? 'sun' : 'moon'" [size]="18"></lucide-icon>
        </button>

        <div class="relative">
          <button (click)="toggleUserMenu()" class="flex h-9 w-9 items-center justify-center rounded-full bg-gradient-to-br from-[var(--color-aether-blue)] to-[var(--color-cyan-spark)] text-[var(--color-pitch-black)] font-bold text-[14px] transition-all hover:shadow-[0_0_15px_rgba(2,184,204,0.4)] active:scale-95 ring-2 ring-[var(--color-pitch-black)] uppercase">
            {{ user()?.nombreUsuario?.charAt(0) || 'U' }}
          </button>

          @if (isUserMenuOpen()) {
            <div class="absolute right-0 top-12 w-56 rounded-2xl border border-[var(--color-charcoal-grey)] bg-[var(--color-graphite)] p-2 shadow-2xl backdrop-blur-xl animate-fade-in z-50">
              <div class="px-3 py-2 border-b border-[var(--color-charcoal-grey)]/60 mb-2">
                <p class="text-[13px] font-[590] text-[var(--color-porcelain)] truncate">{{ user()?.nombreUsuario }}</p>
                <p class="text-[11px] text-[var(--color-storm-cloud)] truncate">{{ user()?.email }}</p>
              </div>
              <button (click)="logout()" class="flex w-full items-center gap-3 rounded-xl px-3 py-2 text-left text-[13px] font-[510] text-red-400 hover:bg-red-500/10 transition-colors">
                <lucide-icon name="log-out" [size]="16"></lucide-icon>
                Cerrar Sesión
              </button>
            </div>
          }
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto bg-[var(--color-pitch-black)] relative">
      <div class="pointer-events-none absolute inset-0 flex items-center justify-center" aria-hidden="true">
        <div class="absolute top-0 right-0 h-[600px] w-[600px] rounded-full bg-[var(--color-aether-blue)] opacity-[0.03] blur-[150px]"></div>
      </div>
      <div class="relative z-10 p-4 sm:p-6 lg:p-8">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
