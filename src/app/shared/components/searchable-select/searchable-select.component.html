<div class="relative" (click)="toggleDropdown()" (keydown.enter)="toggleDropdown()" tabindex="0" role="combobox" [attr.aria-expanded]="isOpen()">
  <label *ngIf="label()" class="block text-sm font-medium text-gray-300 mb-1">{{ label() }}</label>
  
  <div class="flex items-center justify-between w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white cursor-pointer hover:border-gray-500 transition-colors">
    <span class="truncate">{{ selectedLabel() }}</span>
    <lucide-icon [name]="isOpen() ? 'chevron-up' : 'chevron-down'" class="w-4 h-4 text-gray-400"></lucide-icon>
  </div>

  <div *ngIf="isOpen()" class="absolute z-50 mt-1 w-full bg-gray-800 border border-gray-700 rounded-lg shadow-xl" (click)="stopPropagation($event)">
    <div class="p-2 border-b border-gray-700">
      <input
        type="text"
        [placeholder]="placeholder()"
        [(ngModel)]="searchQuery"
        (keydown.enter)="$event.stopPropagation()"
        class="w-full px-3 py-1.5 bg-gray-700 border border-gray-600 rounded-md text-white text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        #searchInput
      />
    </div>
    
    <div class="max-h-60 overflow-y-auto py-1">
      <div *ngIf="showNullOption() && filteredOptions().length > 0"
           class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm text-gray-400 transition-colors"
           (click)="selectNull()">
        {{ nullLabel() }}
      </div>
      
      <div *ngFor="let option of filteredOptions()"
           class="px-3 py-2 hover:bg-gray-700 cursor-pointer text-sm text-white transition-colors"
           (click)="selectOption(option)">
        {{ option.label }}
      </div>
      
      <div *ngIf="filteredOptions().length === 0" class="px-3 py-2 text-sm text-gray-400">
        No se encontraron resultados
      </div>
    </div>
  </div>
</div>

<div *ngIf="isOpen()" class="fixed inset-0 z-40" (click)="closeDropdown()"></div>
