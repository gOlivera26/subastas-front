@if (isOpen) {
  <div class="fixed inset-0 z-[60] flex items-center justify-center p-4 sm:p-6" role="dialog" aria-modal="true">
      <div class="backdrop-layer fixed inset-0 bg-black/60 backdrop-blur-sm transition-opacity animate-fade-in" (click)="onBackdropClick($event)"></div>
      <div class="relative bg-[var(--color-graphite)] rounded-2xl shadow-2xl w-full min-w-0 overflow-hidden transform transition-all animate-scale-in flex flex-col border border-[var(--color-charcoal-grey)] max-h-[90vh]" [ngClass]="maxWidthClass">
        <div class="px-6 py-4 border-b border-[var(--color-charcoal-grey)] flex justify-between items-center bg-[var(--color-graphite)] flex-shrink-0 min-w-0">
            <div class="min-w-0">
                <h3 class="text-[16px] font-[590] text-[var(--color-porcelain)] leading-6 truncate">{{ title }}</h3>
                @if (subtitle) { <p class="text-[12px] text-[var(--color-storm-cloud)] mt-0.5 truncate">{{ subtitle }}</p> }
            </div>
            <button (click)="close.emit()" class="text-[var(--color-storm-cloud)] hover:text-[var(--color-porcelain)] transition-colors p-1.5 rounded-lg hover:bg-[var(--color-deep-slate)] flex-shrink-0 ml-4"><lucide-icon name="x" [size]="20"></lucide-icon></button>
        </div>
        <div class="p-6 overflow-y-auto flex-1 min-w-0"><ng-content></ng-content></div>
        <div class="px-6 py-4 border-t border-[var(--color-charcoal-grey)] flex justify-end gap-3 shrink-0 min-w-0"><ng-content select="[footer]"></ng-content></div>
      </div>
  </div>
}
