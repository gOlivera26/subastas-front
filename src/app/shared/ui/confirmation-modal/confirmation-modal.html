@if (isOpen) {
  <div class="fixed inset-0 z-[60] flex items-center justify-center p-4 sm:p-6" role="dialog" aria-modal="true">

      <div class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm transition-opacity animate-fade-in" (click)="onCancel()"></div>

      <div class="relative bg-white dark:bg-[#1c2128] rounded-xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all animate-scale-in flex flex-col p-6 border border-gray-100 dark:border-white/10">

        <div class="flex items-start gap-4">
          <div class="flex-shrink-0 flex items-center justify-center w-12 h-12 rounded-full"
               [ngClass]="{
                 'bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400': type === 'danger',
                 'bg-orange-100 text-orange-600 dark:bg-orange-900/30 dark:text-orange-400': type === 'warning',
                 'bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400': type === 'info'
               }">
            @if (type === 'danger') { <lucide-icon name="alert-circle" class="w-6 h-6"></lucide-icon> }
            @if (type === 'warning') { <lucide-icon name="alert-triangle" class="w-6 h-6"></lucide-icon> }
            @if (type === 'info') { <lucide-icon name="info" class="w-6 h-6"></lucide-icon> }
          </div>

          <div class="flex-1">
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white leading-6">
              {{ title }}
            </h3>
            <div class="mt-2">
              <p class="text-sm text-gray-500 dark:text-gray-400">
                {{ message }}
              </p>
            </div>
          </div>
        </div>

        <div class="mt-6 flex justify-end gap-3">
          <button type="button"
                  (click)="onCancel()"
                  class="px-4 py-2 bg-white text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50 text-sm font-medium dark:bg-white/5 dark:text-white dark:border-transparent transition-colors focus:outline-none focus:ring-2 focus:ring-gray-200">
            Cancelar
          </button>

          <button type="button"
                  (click)="onConfirm()"
                  class="px-4 py-2 text-white rounded-lg text-sm font-medium shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-offset-2"
                  [ngClass]="{
                    'bg-red-600 hover:bg-red-700 focus:ring-red-500': type === 'danger',
                    'bg-orange-600 hover:bg-orange-700 focus:ring-orange-500': type === 'warning',
                    'bg-brand-600 hover:bg-brand-700 focus:ring-brand-500': type === 'info'
                  }">
            {{ confirmText }}
          </button>
        </div>

    </div>
  </div>
}
