<div class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none">

    @for (toast of notificationService.toasts(); track toast.id) {

        <div class="pointer-events-auto flex items-center w-full max-w-xs p-4 bg-white rounded-xl shadow-xl dark:bg-[#1c2128] ring-1 ring-black/5 dark:ring-white/10 animate-slide-up transition-all transform"
                (click)="notificationService.remove(toast.id)">

            <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg"
                [ngClass]="{
                    'text-green-500 bg-green-100 dark:bg-green-900/30 dark:text-green-400': toast.type === 'success',
                    'text-red-500 bg-red-100 dark:bg-red-900/30 dark:text-red-400': toast.type === 'error',
                    'text-blue-500 bg-blue-100 dark:bg-blue-900/30 dark:text-blue-400': toast.type === 'info'
                }">

            @if (toast.type === 'success') { <lucide-icon name="check" class="w-5 h-5"></lucide-icon> }
            @if (toast.type === 'error') { <lucide-icon name="alert-circle" class="w-5 h-5"></lucide-icon> }
            @if (toast.type === 'info') { <lucide-icon name="info" class="w-5 h-5"></lucide-icon> }

            </div>

            <div class="ml-3 text-sm font-medium text-gray-900 dark:text-white break-words">
            {{ toast.message }}
            </div>

            <button class="ml-auto -mx-1.5 -my-1.5 bg-white text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex items-center justify-center h-8 w-8 dark:text-gray-500 dark:hover:text-white dark:bg-[#1c2128] dark:hover:bg-gray-700"
                    (click)="notificationService.remove(toast.id)">
            <lucide-icon name="x" class="w-3 h-3"></lucide-icon>
            </button>

        </div>
    }

</div>
